<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="assets/favicon/favicon.png" type="image/png" />
  </head>
  <body>
    <header id="header">
      <div id="header-left">Shuraih Mohamed</div>
      <div id="header-middle">
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>
        <a href="blog.html">Blog</a>
        <a href="contact.html">Contact</a>
      </div>
      <div id="header-right">
        <a href="https://github.com/dev2srh" target="_blank"><i class="bi bi-github"></i></a>
        <a href="https://linkedin.com/in/shuraih-mohamed" target="_blank"><i class="bi bi-linkedin"></i></a>
        <a href="https://medium.com/@dev2srh" target="_blank"><i class="bi bi-medium"></i></a>
      </div>
    </header>
    <main>
      <div id="contact">
        <h2>Let's get in touch</h2>
        <form action="">
          <div class="input-div">
            <p>Name</p>
            <input type="text" name="name" id="name-data" required />
          </div>
          <div class="input-div">
            <p>Email</p>
            <input type="email" name="email" id="email-data" required />
          </div>
          <div class="input-div">
            <p>Subject</p>
            <input type="text" name="subject" id="subject-data" required />
          </div>
          <div class="input-div">
            <p>Message</p>
            <textarea name="message" id="message-data" rows="5" required></textarea>
          </div>
          <div id="btn-div">
            <input type="submit" value="Send" />
          </div>
        </form>
      </div>
    </main>
    <footer id="footer">
      <div id="footer-email">
        <i class="bi bi-envelope-fill"></i>
        <a href="mailto:dev2srh@hotmail.com">dev2srh@hotmail.com</a>
      </div>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
